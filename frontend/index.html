<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Power</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#4f46e5,#9333ea);
      color: white;
    }
    .container { padding: 20px; }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 15px;
      cursor: pointer;
    }
    .title { font-size: 22px; font-weight: bold; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="title">Habit Power</div>

  <div class="card" onclick="addPoints()">✅ Отметить выполнение</div>
  
  <div class="card">
  <input id="habitInput" placeholder="Новая привычка"
         style="padding:8px;border-radius:8px;border:none;width:100%;">
  <button onclick="addHabit()" style="margin-top:8px;">Добавить</button>
</div>

<div id="habitsList"></div>

  <div class="card">
    🏆 Очки: <span id="points">0</span>
  </div>
</div>
<div class="card" onclick="showLeaderboard()">🏆 Рейтинг</div>

<div id="leaderboard" style="margin-top:15px;"></div>
<script>
document.addEventListener("DOMContentLoaded", function() {

  let pointsEl = document.getElementById("points");
  let telegramUser = null;

  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.expand();
    telegramUser = tg.initDataUnsafe?.user;
  }

  async function loadUser() {
    if (!telegramUser) return;

    const res = await fetch("/api/user", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        telegram_id: telegramUser.id
      })
    });

    const data = await res.json();
    pointsEl.innerText = data.points;
  }

  window.addPoints = async function() {
    if (!telegramUser) return;

    const res = await fetch("/api/add-points", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        telegram_id: telegramUser.id
      })
    });

    const data = await res.json();
    pointsEl.innerText = data.points;
  };
window.showLeaderboard = async function() {
  const res = await fetch("/api/leaderboard");
  const data = await res.json();

  let html = "<div class='card'><b>🏆 Таблица лидеров</b><br><br>";

  data.forEach(user => {
    html += `#${user.rank} — ${user.points} очков<br>`;
  });

  html += "</div>";

  document.getElementById("leaderboard").innerHTML = html;
};

window.addHabit = async function() {
  const input = document.getElementById("habitInput");
  const name = input.value;

  if (!name) return;

  await fetch("/api/add-habit", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      telegram_id: telegramUser.id,
      name: name
    })
  });

  input.value = "";
  loadHabits();
};

async function loadHabits() {
  if (!telegramUser) return;

  const res = await fetch(`/api/habits/${telegramUser.id}`);
  const habits = await res.json();

  let html = "";

  habits.forEach(habit => {

let emoji = "⭐"

if(habit.name.toLowerCase().includes("run")) emoji = "🏃"
if(habit.name.toLowerCase().includes("read")) emoji = "📚"
if(habit.name.toLowerCase().includes("water")) emoji = "💧"
if(habit.name.toLowerCase().includes("workout")) emoji = "🏋️"
if(habit.name.toLowerCase().includes("code")) emoji = "💻"

html += `
<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center">

<div>
${emoji} ${habit.name} 🔥 ${habit.streak}
</div>

<div>

<button onclick="completeHabit(${habit.id})" 
style="background:#2ecc71;border:none;padding:6px 10px;border-radius:6px;color:white;margin-right:6px">
✔
</button>

<button onclick="deleteHabit(${habit.id})"
style="background:#e74c3c;border:none;padding:6px 10px;border-radius:6px;color:white">
🗑
</button>

</div>

</div>

</div>
`

})
  document.getElementById("habitsList").innerHTML = html;
}

window.completeHabit = async function(id){

const res = await fetch("/api/complete-habit", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({habit_id:id})
})

const data = await res.json()

if(data.error === "already_completed"){
alert("Сегодня уже выполнено")
return
}

document.getElementById("points").innerText = data.points

loadHabits()

}

window.deleteHabit = async function(id){

if(!confirm("Удалить привычку?")) return

await fetch("/api/delete-habit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({habit_id:id})
})

loadHabits()

}
  
  loadUser();
loadHabits();

});
</script>

</body>
</html>
