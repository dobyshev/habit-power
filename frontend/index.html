<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Power</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#4f46e5,#9333ea);
      color: white;
    }
    .container { padding: 20px; }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 15px;
      cursor: pointer;
    }
    .title { font-size: 22px; font-weight: bold; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="title">Habit Power</div>

  <div class="card" onclick="addPoints()">✅ Отметить выполнение</div>

  <div class="card">
    🏆 Очки: <span id="points">0</span>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  let pointsEl = document.getElementById("points");
  let telegramUser = null;

  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.expand();
    telegramUser = tg.initDataUnsafe?.user;
  }

  async function loadUser() {
    if (!telegramUser) return;

    const res = await fetch("/api/user", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        telegram_id: telegramUser.id
      })
    });

    const data = await res.json();
    pointsEl.innerText = data.points;
  }

  window.addPoints = async function() {
    if (!telegramUser) return;

    const res = await fetch("/api/add-points", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        telegram_id: telegramUser.id
      })
    });

    const data = await res.json();
    pointsEl.innerText = data.points;
  };

  loadUser();

});
</script>

</body>
</html>
