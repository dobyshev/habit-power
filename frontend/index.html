<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Power</title>
    <script>
      // Загружаем Telegram WebApp SDK
      window.Telegram = window.Telegram || {};

      // Автоматическая версия для обновления на телефонах
      const version = new Date().getTime();
      document.write(`<link rel="stylesheet" href="style.css?v=${version}">`);
      document.write(
        `<script src="https://telegram.org/js/telegram-web-app.js?1"><\/script>`,
      );
      document.write(`<script src="script.js?v=${version}"><\/script>`);
    </script>
  </head>
  <body>
    <div class="app">
      <!-- ВЕРХНИЙ ЗАГОЛОВОК -->
      <div class="main-header">
        <h1 id="mainHeaderTitle">Habit Power</h1>
      </div>

      <!-- БЛОК ПРОГРЕСС СЕГОДНЯ -->
      <div class="progress-wrapper compact" id="progressBlock">
        <div class="progress-card">
          <div class="progress-header">
            <span class="progress-title">
              <span class="progress-icon">📈</span>
              Прогресс сегодня
            </span>
            <span class="progress-percent" id="progressPercent">0%</span>
          </div>

          <div class="progress-text" id="progressText">
            0 из 0 привычек выполнено
          </div>

          <div class="progress-bar-container">
            <div
              class="progress-bar-fill"
              id="progressBarFill"
              style="width: 0%"
            ></div>
          </div>

          <div class="progress-message" id="progressMessage">
            👋 Добавьте привычки для начала
          </div>
        </div>
      </div>

      <!-- НАВИГАЦИЯ -->
      <div class="nav-bar" id="navBar">
        <button class="nav-back" id="navBackBtn" style="display: none">
          ← Назад
        </button>
        <h2 class="nav-title" id="navTitle">Главное меню</h2>
      </div>

      <!-- ЭКРАНЫ (ОСНОВНОЙ КОНТЕНТ) -->
      <div id="screenContainer" class="screen-container"></div>

      <!-- НИЖНЯЯ НАВИГАЦИЯ -->
      <div class="tab-bar">
        <div class="tab-item" id="tabHome" data-tab="home">
          <span class="tab-icon">🏠</span>
          <span class="tab-label">Главная</span>
        </div>
        <div class="tab-item" id="tabProfile" data-tab="profile">
          <span class="tab-icon">👤</span>
          <span class="tab-label">Профиль</span>
        </div>
      </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ВЫБОРА ЭМОДЗИ -->
    <div class="modal" id="emojiPickerModal">
      <div class="modal-content emoji-picker-content">
        <div class="modal-header">
          <h2>Выберите эмодзи</h2>
          <button class="close-btn" id="closeEmojiPickerBtn">&times;</button>
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
    </div>
  </body>
</html>
