<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habit Power</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
padding:20px;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.points{
margin-bottom:15px;
font-size:18px;
}

.card{
background:#1a1a1a;
border:1px solid #2a2a2a;
padding:16px;
border-radius:16px;
margin-bottom:12px;
}

button{
border:none;
padding:8px 14px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.complete{
background:#22c55e;
margin-right:8px;
}

.delete{
background:#ef4444;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:8px;
}

.addbtn{
background:#3b82f6;
}

</style>

</head>

<body>

<div class="container">

<div class="title">Habit Power</div>

<div class="points">
⭐ Очки: <span id="points">0</span>
</div>

<div class="card">

<input id="habitInput" placeholder="Новая привычка"/>

<button class="addbtn" onclick="addHabit()">Добавить</button>

</div>

<div id="habitsList"></div>

</div>

<script>

let telegramUser=null
let pointsEl=document.getElementById("points")

if(window.Telegram && window.Telegram.WebApp){
const tg=window.Telegram.WebApp
tg.expand()
telegramUser=tg.initDataUnsafe.user
}

async function loadUser(){

if(!telegramUser) return

const res=await fetch("/api/user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telegram_id:telegramUser.id
})
})

const data=await res.json()

pointsEl.innerText=data.points

}

async function addHabit(){

const input=document.getElementById("habitInput")
const name=input.value

if(!name) return

await fetch("/api/add-habit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telegram_id:telegramUser.id,
name:name
})
})

input.value=""

loadHabits()

}

function getEmoji(name){

name=name.toLowerCase()

if(name.includes("run")) return "🏃"
if(name.includes("read")) return "📚"
if(name.includes("water")) return "💧"
if(name.includes("workout")) return "🏋️"
if(name.includes("code")) return "💻"
if(name.includes("sleep")) return "🛌"
if(name.includes("study")) return "🎓"

return "⭐"

}

async function loadHabits(){

if(!telegramUser) return

const res=await fetch(`/api/habits/${telegramUser.id}`)
const habits=await res.json()

let html=""

habits.forEach(habit=>{

html+=`

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center">

<div>
${getEmoji(habit.name)} ${habit.name} 🔥 ${habit.streak}
</div>

<div>

<button class="complete"
onclick="completeHabit(${habit.id})">
✔
</button>

<button class="delete"
onclick="deleteHabit(${habit.id})">
🗑
</button>

</div>

</div>

</div>

`

})

document.getElementById("habitsList").innerHTML=html

}

async function completeHabit(id){

const res=await fetch("/api/complete-habit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
habit_id:id
})
})

const data=await res.json()

if(data.error==="already_completed"){
alert("Сегодня уже выполнено")
return
}

pointsEl.innerText=data.points

loadHabits()

}

async function deleteHabit(id){

if(!confirm("Удалить привычку?")) return

await fetch("/api/delete-habit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
habit_id:id,
telegram_id:telegramUser.id
})
})

loadHabits()

}

loadUser()
loadHabits()

</script>

</body>
</html>
