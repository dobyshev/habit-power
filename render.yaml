services:
  - type: web
    name: habit-power
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habit-power-db
          property: connectionString

databases:
  - name: habit-power-db
    plan: free

